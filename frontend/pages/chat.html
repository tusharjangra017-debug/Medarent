<!DOCTYPE html>
<html>
<head>
  <title>AI Chat</title>
  <link rel="stylesheet" href="../css/style.css">

  <style>
    .chat-container {
      max-width: 600px;
      margin: 40px auto;
    }

    .chat-box {
      background: rgba(255,255,255,0.05);
      padding: 20px;
      height: 400px;
      overflow-y: auto;
      border-radius: 10px;
    }

    .input-box {
      display: flex;
      margin-top: 10px;
    }

    .input-box input {
      flex: 1;
      padding: 10px;
      border-radius: 10px 0 0 10px;
      border: none;
    }

    .input-box button {
      padding: 10px;
      border: none;
      background: #22c55e;
      border-radius: 0 10px 10px 0;
      cursor: pointer;
    }

    .msg {
      margin: 10px 0;
    }

    .user { color: #22c55e; }
    .bot { color: #facc15; }
  </style>
</head>

<body>

<div class="navbar">
  <h1>AI Health Chat</h1>
  <button onclick="goHome()">← Back</button>
</div>

<div class="chat-container">
  <div class="chat-box" id="chatBox"></div>

  <div class="input-box">
    <input type="text" id="userInput" placeholder="Ask health question...">
<button onclick="sendMessage()">Send</button>

<div id="chatBox"></div>

<script src="../js/app.js"></script>
</body>
</html>
