<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Checkout - MEDARENT</title>
<link rel="stylesheet" href="../css/style.css">
</head>

<body>

<div class="checkout-wrapper">

  <!-- LEFT SIDE -->
  <div class="checkout-left">

    <h2>💳 Checkout</h2>

    <!-- ADDRESS -->
    <div class="card">
      <h3>📍 Delivery Address</h3>
      <!-- <input type="text" id="name" placeholder="Full Name">
      <input type="text" id="phone" placeholder="Phone Number">
      <textarea id="address" placeholder="Full Address"></textarea> -->
      <input type="text" id="name" placeholder="Full Name">
      <input type="text" id="phone" placeholder="Phone Number">
      <textarea id="address" placeholder="Full Address"></textarea>
    </div>

    <!-- PAYMENT -->
    <div class="card">
      <h3>💰 Payment Method</h3>
      <!-- <label><input type="radio" name="pay" checked> Cash on Delivery</label>
      <label><input type="radio" name="pay"> UPI</label>
      <label><input type="radio" name="pay"> Card</label> -->
      <input type="radio" name="payment" value="COD"> Cash on Delivery
<input type="radio" name="payment" value="UPI"> UPI
<input type="radio" name="payment" value="CARD"> Card
    </div>

  </div>

  <!-- RIGHT SIDE -->
  <div class="checkout-right">

<div class="summary-card">
  <h3>📄 Order Summary</h3>

  <div id="summaryItems"></div>

  <h4 id="summaryTotal">Total: ₹0</h4>

 

    <hr>

    <h2 id="totalAmount"></h2>

    <button class="place-order-btn" onclick="placeOrder()">
      Place Order 🚀
    </button>
    

  </div>

</div>

<!-- <div id="popup" class="popup">
  <div class="popup-box">
    <h2>✅ Order Placed</h2>
    <p>Your order is confirmed 🎉</p>
    <button onclick="goToSuccess()">Track Order</button>
  </div>
</div> -->

<div id="popup" class="popup">
  <div class="popup-box">
    <p id="popupText"></p>
    <button onclick="closePopup()">OK</button>
  </div>
</div>

<script src="../js/app.js"></script>

<script>
loadCheckoutSummary();
</script>

</body>
</html>
